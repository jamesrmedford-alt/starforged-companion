name: CI

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

env:
  # Force GitHub Actions' own tooling (checkout, setup-node) to use Node 24
  # rather than their bundled Node 20, suppressing the deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint and unit tests
  # No Foundry required — Vitest runs in Node with stubbed globals via tests/setup.js
  # ────────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage
        # Coverage thresholds enforced in vitest.config.js:
        #   lines 80%, functions 50%, branches 75%
        # Job fails if thresholds are not met.

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Manifest validation
  # Validates module.json structure, compatibility fields, and pack files.
  # ────────────────────────────────────────────────────────────────────────────
  validate-manifest:
    name: Validate Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate module.json is valid JSON
        run: |
          python3 -c "import json, sys; json.load(open('module.json'))" \
            && echo "module.json is valid JSON" \
            || (echo "module.json is not valid JSON" && exit 1)

      - name: Check required manifest fields
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("module.json") as f:
            m = json.load(f)

          required = ["id", "title", "version", "compatibility", "esmodules", "languages"]
          missing = [k for k in required if k not in m]

          if missing:
            print(f"Missing required fields: {missing}")
            sys.exit(1)

          compat = m.get("compatibility", {})
          if "minimum" not in compat:
            print("compatibility.minimum is required")
            sys.exit(1)

          print(f"Manifest OK — id: {m['id']}, version: {m['version']}")
          EOF

      - name: Check language file exists and is valid JSON
        run: |
          python3 - <<'EOF'
          import json, os, sys

          with open("module.json") as f:
            m = json.load(f)

          for lang in m.get("languages", []):
            path = lang.get("path", "")
            if not os.path.exists(path):
              print(f"Language file not found: {path}")
              sys.exit(1)
            try:
              with open(path) as f:
                json.load(f)
              print(f"Language file OK: {path}")
            except json.JSONDecodeError as e:
              print(f"Language file invalid JSON: {path} — {e}")
              sys.exit(1)
          EOF

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — Release packaging
  # Only runs on version tags (v*). Creates a zip and GitHub release.
  # IMPORTANT: module.json version and URLs are updated BEFORE building the zip
  # so both the zip contents and the loose manifest attachment are consistent.
  # Foundry update detection requires the version field to change between releases.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-manifest]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update module.json version and URLs
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/starforged-companion-${{ steps.version.outputs.version }}.zip"
          MANIFEST_URL="https://github.com/${{ github.repository }}/releases/latest/download/module.json"
          VERSION="${{ steps.version.outputs.version }}"

          python3 - <<PYEOF
          import json

          with open("module.json") as f:
            m = json.load(f)

          # Update version to match the git tag — required for Foundry update detection
          m["version"]  = "${VERSION}"
          m["download"] = "${DOWNLOAD_URL}"
          m["manifest"] = "${MANIFEST_URL}"
          m["url"]      = "https://github.com/${{ github.repository }}"

          with open("module.json", "w") as f:
            json.dump(m, f, indent=2)

          print(f"Updated module.json: version={m['version']}, download={m['download']}")
          PYEOF

      - name: Build release zip
        run: |
          mkdir -p dist

          # Zip is built AFTER module.json is updated so the correct version,
          # manifest URL, and download URL are all inside the installed package.
          # vendor/ is excluded — submodule references only (foundry-ironsworn, fvtt-quench), not module content.
          # docs/ is excluded — developer documentation, not needed by end users.
          zip -r dist/starforged-companion-${{ steps.version.outputs.version }}.zip \
            module.json \
            README.md \
            CHANGELOG.md \
            LICENSE.md \
            lang/ \
            styles/ \
            src/ \
            packs/ \
            proxy/ \
            --exclude "src/foundry-shim.js" \
            --exclude "*.test.js" \
            --exclude "vendor/*" \
            --exclude ".git*"

          echo "Release zip contents:"
          unzip -l dist/starforged-companion-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Starforged Companion v${{ steps.version.outputs.version }}
          body: |
            ## Starforged Companion v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.

            ### Installation
            Paste this manifest URL into Foundry's **Add-on Modules → Install Module** dialog:
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/module.json
            ```

            ### Existing installs
            Use **Add-on Modules → Update** — Foundry will detect the new version automatically.

            ### Requirements
            - Foundry VTT v12+
            - Node.js 18+ (for the local API proxy — not needed on The Forge)
            - Anthropic API key (console.anthropic.com)
          files: |
            dist/starforged-companion-${{ steps.version.outputs.version }}.zip
            module.json
          draft: false
          prerelease: false
