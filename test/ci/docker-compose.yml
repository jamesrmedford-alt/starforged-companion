# Local CI / development stack for the Starforged Companion module.
#
# Boots Foundry VTT v13 with the foundry-ironsworn system, the Starforged
# Companion module (copied from the working tree by install-deps.sh), and
# Quench pre-installed. The user logs in via http://localhost:30000 to run
# integration tests manually.
#
# Credentials (FOUNDRY_USERNAME, FOUNDRY_PASSWORD, FOUNDRY_ADMIN_KEY)
# come from macOS Keychain — start.sh exports them before invoking
# compose. The ${VAR:?...} syntax below makes compose fail loudly if
# you bypass start.sh and run `docker compose up` directly.
#
# Phase 1 of the CI work — no Cypress / no GitHub Actions yet.

services:
  foundry:
    image: ghcr.io/felddy/foundryvtt:13
    container_name: starforged-ci-foundry
    # Stable hostname is required by felddy's license fingerprinting.
    # Without this, the license re-verifies (and may fail) on every
    # restart, which kills the test loop.
    hostname: starforged-ci-host
    init: true
    restart: "no"
    ports:
      - "30000:30000"
    volumes:
      # The only bind mount. Persists Foundry's userData (Data, Config,
      # Logs, container_cache) across restarts. install-deps.sh writes
      # the systems/, modules/, and worlds/ trees here before boot.
      - ./data:/data
    environment:
      FOUNDRY_USERNAME:  ${FOUNDRY_USERNAME:?run scripts/start.sh — credentials come from macOS Keychain}
      FOUNDRY_PASSWORD:  ${FOUNDRY_PASSWORD:?run scripts/start.sh — credentials come from macOS Keychain}
      FOUNDRY_ADMIN_KEY: ${FOUNDRY_ADMIN_KEY:?run scripts/start.sh — credentials come from macOS Keychain}
      FOUNDRY_TELEMETRY: "false"
      CONTAINER_CACHE:   /data/container_cache
      # Hostname Foundry advertises to clients. Matches the docker
      # hostname so license fingerprinting stays consistent.
      FOUNDRY_HOSTNAME:  starforged-ci-host
